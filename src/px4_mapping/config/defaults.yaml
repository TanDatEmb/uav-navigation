# Default parameters for px4_mapping nodes.
# Override via command line or a top-level launch file.

lio_px4_bridge:
  ros__parameters:
    # Input: FAST-LIO odometry in ENU world / FLU body.
    lio_topic: "/lio/odometry"

    # Input: PX4 vehicle odometry in NED world / FRD body.
    px4_odom_topic: "/fmu/out/vehicle_odometry"

    # Output: PX4 external visual odometry in NED world / FRD body.
    px4_topic: "/fmu/in/vehicle_visual_odometry"

    # Estimate and apply a fixed T_map_ned_lio_world from PX4 odometry at startup.
    align_to_px4: true

    # Alignment strategy:
    # - translation_only: keep axes, only align origin offset
    # - yaw_translation: align heading + origin
    # - full_6dof: align full SE(3)
    alignment_mode: "translation_only"

    # External vision variance (position [m^2], orientation [rad^2]).
    position_variance: [0.04, 0.04, 0.09]
    orientation_variance: [0.25, 0.25, 0.05]

    # External vision quality indicator (1-100).
    visual_odom_quality: 100

global_mapper:
  ros__parameters:
    # Input point cloud from the LIO frontend.
    cloud_topic: "/lio/cloud_registered"

    # Output topics for the accumulated global map and the rolling local view.
    map_topic: "/mapping/occupancy/global"
    local_map_topic: "/mapping/occupancy/local"

    # Input localization odometry (lio_world frame).
    lio_odom_topic: "/lio/odometry"

    # Publish the complete accumulated map for diagnostics and long-range context.
    publish_global_map: true

    # Full-map serialization dominates runtime as the map grows. Publish it at
    # 2 Hz for a 10 Hz LiDAR while keeping the local map updated every frame.
    global_map_publish_interval: 5

    # Rolling spatial snapshot selected from persistent global occupancy, not
    # from the current LiDAR scan. A 30 m radius preserves visible local history
    # behind the UAV while covering a 60 m-wide local planning neighbourhood.
    publish_local_map: true
    local_map_radius_m: 30.0

    # Opt-in legacy memory mode. Global occupancy is bounded only by voxel
    # capacity and frame age.
    enable_distance_eviction: false

    # Lidar-to-IMU extrinsic translation in metres (sensor frame w.r.t. IMU).
    # Kept for potential future point-cloud preprocessing; the global mapper
    # consumes already-registered points in lio_world.
    extrinsic_T: [-0.011, -0.02329, 0.04412]

    # Readiness gate: require this many consecutive frames and occupied voxels.
    ready_min_frames: 5
    ready_min_occupied: 1000

    # Optional alignment gate before marking map ready.
    require_alignment_gate: false
    aligned_min_seconds: 5.0
    aligned_max_velocity: 0.05
    aligned_lio_covariance_max: 0.01
    aligned_max_seconds_to_capture: 30.0
    aligned_timeout_action: "hold_indefinitely"

    # Logging interval (frames) and timeout (seconds).
    log_interval: 1
    timeout_seconds: 3600.0
    log_path: ""

    # Removed: use_lio_buffer. The mapper always uses the LIO pose buffer
    # because it only consumes /lio/cloud_registered in lio_world.
