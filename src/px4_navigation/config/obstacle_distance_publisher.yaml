# Configuration for the obstacle_distance_publisher node.
# This node converts a PointCloud2 (NED frame) into a 72-bin horizontal
# obstacle distance array and publishes it to PX4 for Collision Prevention.

obstacle_distance_publisher:
  ros__parameters:
    # Publish rate (Hz). PX4 CP timeout is 500 ms; 20 Hz gives margin and
    # reduces latency.
    publish_rate_hz: 20.0

    # Distance range in centimetres. Match the Livox Mid-360 blind zone
    # (0.1 m) and detection range (40 m). Values > max_distance are treated
    # as "no obstacle".
    min_distance_cm: 10        # 0.1 m — Livox close-proximity blind zone
    max_distance_cm: 4000      # 40 m — Livox max detection range

    # Height band (metres). Only points within +/- this value of the drone's
    # altitude are included in the horizontal scan. Must cover the Livox
    # Mid-360 vertical FOV at the CP keep-out distance (e.g. at 2.5 m,
    # +52° gives ~2.0 m above the drone). 3.0 m keeps nearby obstacles while
    # avoiding ground/ceiling clutter.
    height_band_m: 3.0

    # Stale timeout (ms). If no point cloud arrives within this window, all
    # bins are set to UINT16_MAX (unknown) to clear PX4's obstacle map.
    # Must be < PX4's RANGE_STREAM_TIMEOUT (500 ms).
    stale_timeout_ms: 400

    # Topics.
    input_cloud_topic: "/livox_processed_ned"
    vehicle_odom_topic: "/fmu/out/vehicle_odometry"
    obstacle_distance_topic: "/fmu/in/obstacle_distance"

    # MAV frame: 12 = MAV_FRAME_BODY_FRD (vehicle front-aligned).
    # Use 0 = MAV_FRAME_GLOBAL (north-aligned) if the cloud is already
    # north-referenced and you want PX4 to apply yaw rotation.
    frame: 12