# FAST-LIO2 Profile: MID-360 PointCloud2
# Requires: livox_ros_driver2 with xfer_format=0

fast_lio:
  ros__parameters:
    input.mode: "mid360_pointcloud2"

    topics.lidar: "/livox/mid360/points"
    topics.imu: "/livox/mid360/imu"

    frames.world: "lio_world"
    frames.body: "mid360_imu"
    frames.lidar: "mid360_lidar_frame"

    filter.min_range: 0.5
    filter.max_range: 40.0

    filter.scan_voxel_size: 0.3
    filter.map_voxel_size: 0.3

    mapping.detection_range: 40.0
    mapping.cube_side_length: 50.0
    mapping.move_threshold: 0.5
