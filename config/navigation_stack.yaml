# Global runtime parameters for the uav-navigation stack.
# Package-specific defaults live in <package>/config/defaults.yaml.

/**:
  ros__parameters:
    # Use simulation clock by default in SITL scenarios.
    use_sim_time: true

px4_mapping:
  ros__parameters:
    # Placeholder for FAST-LIO2 / local map parameters.
    map_frame: "map"
    body_frame: "base_link"
    lidar_frame: "lidar"

px4_navigation:
  ros__parameters:
    # Planner / controller placeholders.
    control_rate_hz: 20.0
    planning_rate_hz: 5.0
    vehicle_radius_m: 0.35
    safety_margin_m: 0.5

  # Obstacle distance publisher for PX4 Collision Prevention.
  obstacle_distance_publisher:
    ros__parameters:
      publish_rate_hz: 10.0
      min_distance_cm: 30
      max_distance_cm: 1500
      height_band_m: 2.0
      stale_timeout_ms: 400
      input_cloud_topic: "/livox_processed_ned"
      vehicle_odom_topic: "/fmu/out/vehicle_odometry"
      obstacle_distance_topic: "/fmu/in/obstacle_distance"
      frame: 12  # MAV_FRAME_BODY_FRD

px4_ros_com:
  ros__parameters:
    # Placeholder for bridge / offboard parameters.
    offboard_timeout_s: 1.0
    position_topic: "/fmu/in/trajectory_setpoint"
    vehicle_odometry_topic: "/fmu/out/vehicle_odometry"
