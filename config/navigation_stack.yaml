# Global runtime parameters for the uav-navigation stack.
# Package-specific defaults live in <package>/config/defaults.yaml.

/**:
  ros__parameters:
    # Use simulation clock by default in SITL scenarios.
    use_sim_time: true

px4_mapping:
  ros__parameters:
    # Canonical frame names used across the stack.
    map_frame: "map_ned"
    body_frame: "base_link"
    lidar_frame: "lidar"

  # World bridge node: converts L1 camera_init data to map_ned.
  localization_bridge:
    ros__parameters:
      input_cloud_topic: "/localization/cloud"
      output_cloud_topic: "/world/cloud"
      lio_odom_topic: "/localization/odometry"
      px4_odom_topic: "/fmu/out/vehicle_odometry"
      use_px4_odom: true
      publish_visual_odometry_to_px4: false
      visual_odom_topic: "/fmu/in/vehicle_visual_odometry"
      visual_odom_align_to_px4: true
      visual_odom_alignment_mode: "translation_only"
      visual_odom_align_full_6dof: false
      visual_odom_position_variance: [0.04, 0.04, 0.09]
      visual_odom_orientation_variance: [0.25, 0.25, 0.05]
      visual_odom_quality: 100

  # Voxel map node: builds the sparse global map in map_ned.
  global_mapper:
    ros__parameters:
      cloud_topic: "/world/cloud"
      map_topic: "/mapping/global"
      lio_odom_topic: "/localization/odometry"
      input_source: "px4_full"
      publish_local_map: true
      extrinsic_T: [-0.011, -0.02329, 0.04412]
      ready_min_frames: 5
      ready_min_occupied: 1000
      require_alignment_gate: false
      aligned_min_seconds: 5.0
      aligned_max_velocity: 0.05
      aligned_lio_covariance_max: 0.01
      aligned_max_seconds_to_capture: 30.0
      aligned_timeout_action: "hold_indefinitely"
      log_interval: 1
      timeout_seconds: 3600.0
      log_path: ""
      use_lio_buffer: true

px4_navigation:
  ros__parameters:
    # Planner / controller placeholders.
    control_rate_hz: 20.0
    planning_rate_hz: 5.0
    vehicle_radius_m: 0.35
    safety_margin_m: 0.5

  # Obstacle perception node for PX4 Collision Prevention.
  obstacle_perception:
    ros__parameters:
      # Spherical grid resolution.
      yaw_bins: 72
      pitch_bins: 28
      min_pitch_deg: -7.0
      max_pitch_deg: 52.0

      # Reported distance range (m). Match Livox Mid-360 blind zone and max range.
      min_distance_m: 0.1
      max_distance_m: 40.0

      # Points closer than this radius to the sensor origin are ignored so the
      # UAV frame / propellers / landing gear do not produce false obstacles.
      body_exclusion_radius_m: 0.30

      # Publish rate (Hz). Must stay well below PX4 CP timeout (500 ms).
      publish_rate_hz: 20.0

      # Stale timeout (ms). If no cloud arrives within this window, clear the map.
      stale_timeout_ms: 400

      # Coordinate frame of the input point cloud.
      #   "sensor"     : cloud is already in PX4 body FRD frame.
      #   "sensor_flu" : cloud is in ROS/Gazebo conventional FLU frame.
      #   "ned"        : cloud is in map_ned world frame.
      cloud_frame: "sensor_flu"

      # Topics.
      input_cloud_topic: "/lidar_360/points"
      vehicle_odom_topic: "/fmu/out/vehicle_odometry"
      obstacle_distance_topic: "/fmu/in/obstacle_distance"
      local_virtual_scan_topic: "/perception/scan_1d"
      grid_markers_topic: "/visualization/grid_2d5/markers"
      min_distance_cloud_topic: "/visualization/grid_2d5/min_distance"

      # Debug publishers. Disable to reduce bandwidth when not needed.
      publish_grid_markers: true
      publish_min_distance_cloud: true

  # Obstacle distance visualizer for PX4 Collision Prevention debug.
  obstacle_distance_visualizer:
    ros__parameters:
      publish_rate_hz: 20.0
      obstacle_distance_topic: "/fmu/in/obstacle_distance"
      markers_topic: "/visualization/obstacle_markers"
      scale_min_m: 0.1
      scale_max_m: 20.0
      frame: 12 # MAV_FRAME_BODY_FRD
      sensor_orientation: 0 # MAV_SENSOR_ORIENTATION_NONE

# Placeholder for bridge / offboard parameters (previously under px4_ros_com).
